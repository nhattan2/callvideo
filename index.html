<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DTU MEET Pro - Mobile Sync Fix</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #0a192f; --gold: #ffd700; --navy: #112240; --cyan: #64ffda; --red: #ff4d4d; --gray: #233554; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; user-select: none; touch-action: manipulation; }
        body { background: var(--bg); color: #e6f1ff; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        #video-grid { flex: 1; display: flex; flex-wrap: wrap; gap: 10px; padding: 70px 10px 10px 10px; align-content: center; justify-content: center; overflow-y: auto; }
        .video-wrapper { position: relative; background: #000; border-radius: 12px; overflow: hidden; aspect-ratio: 16/9; border: 2px solid var(--gray); width: 100%; max-width: 400px; }
        .speaking { border-color: var(--gold) !important; box-shadow: 0 0 10px var(--gold); }
        
        .toolbar { height: 75px; background: var(--navy); display: flex; justify-content: center; align-items: center; gap: 10px; border-top: 1px solid var(--gray); padding-bottom: env(safe-area-inset-bottom); }
        .btn-tool { width: 45px; height: 45px; border-radius: 50%; border: none; cursor: pointer; background: var(--gray); color: white; font-size: 18px; }
        
        #chat-section { width: 300px; display: flex; flex-direction: column; background: var(--navy); border-left: 1px solid var(--gray); }
        #chat-section.hidden { display: none; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 5px; font-size: 13px; }
        .msg { padding: 8px 12px; border-radius: 15px; max-width: 85%; word-wrap: break-word; }
        .msg-me { align-self: flex-end; background: var(--cyan); color: var(--bg); }
        .msg-them { align-self: flex-start; background: var(--gray); color: white; }

        @media (max-width: 768px) { #chat-section { position: fixed; inset: 0; width: 100%; z-index: 2000; } }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="home-screen" style="position:fixed; inset:0; background:var(--bg); z-index:5000; display:flex; align-items:center; justify-content:center; padding:20px;">
    <div style="background:var(--navy); padding:25px; border-radius:20px; width:100%; max-width:380px; border:1px solid var(--cyan); text-align:center;">
        <h2 style="color:var(--gold); margin:0 0 15px 0;">DTU MEET PRO</h2>
        <input type="text" id="userName" placeholder="Tên của bạn..." style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:none; background:#0d1b2a; color:white;">
        <button onclick="startApp(true)" style="width:100%; padding:12px; background:var(--cyan); border:none; border-radius:8px; font-weight:bold;">TẠO PHÒNG</button>
        <div style="margin:10px 0; opacity:0.5;">-- HOẶC --</div>
        <input type="text" id="roomInput" inputmode="numeric" placeholder="Nhập mã 6 số..." style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:none; background:#0d1b2a; color:white;">
        <button onclick="startApp(false)" style="width:100%; padding:12px; background:transparent; border:1px solid var(--cyan); color:var(--cyan); border-radius:8px;">VÀO PHÒNG</button>
    </div>
</div>

<div id="app-container" style="display:none; height:100vh; flex-direction:row;">
    <div id="video-section" style="flex:1; display:flex; flex-direction:column; position:relative;">
        <div style="position:absolute; top:15px; left:15px; right:15px; display:flex; justify-content:space-between; z-index:100; pointer-events:none;">
            <div style="background:rgba(17,34,64,0.9); padding:8px 15px; border-radius:10px; border:1px solid var(--cyan); color:var(--gold); pointer-events:auto;" onclick="copyRoom()">🔑: <span id="room-display">------</span></div>
            <div style="background:rgba(17,34,64,0.9); padding:8px 15px; border-radius:10px; border:1px solid var(--cyan); color:white;">👥 <span id="user-count">1</span></div>
        </div>
        <div id="video-grid"></div>
        <div class="toolbar">
            <button class="btn-tool" id="micBtn" onclick="toggleMic()">🎤</button>
            <button class="btn-tool" id="camBtn" onclick="toggleCam()">📷</button>
            <button class="btn-tool" onclick="toggleChat()">💬</button>
            <button class="btn-tool" id="shareBtn" onclick="toggleShare()">🖥️</button>
            <button onclick="location.reload()" style="background:var(--red); color:white; border:none; padding:10px 20px; border-radius:20px; font-weight:bold;">RỜI PHÒNG</button>
        </div>
    </div>
    <div id="chat-section" class="hidden">
        <div style="padding:15px; font-weight:bold; border-bottom:1px solid var(--gray); display:flex; justify-content:space-between;">
            <span>CHAT BOX</span>
            <span onclick="toggleChat()" style="cursor:pointer; color:var(--red);">Đóng [X]</span>
        </div>
        <div id="chat-messages"></div>
        <div style="padding:10px; display:flex; gap:5px; border-top:1px solid var(--gray);">
            <input type="text" id="chatInput" placeholder="Nhắn tin..." style="flex:1; padding:10px; border-radius:20px; border:none; background:var(--gray); color:white; outline:none;">
            <button onclick="sendChat()" style="background:var(--cyan); border:none; border-radius:50%; width:40px; height:40px;">➤</button>
        </div>
    </div>
</div>

<script>
    let localStream, peer, myName, roomCode, isAdmin = false;
    const conns = {}; 
    const peersInRoom = new Set();

    async function startApp(isCreate) {
        myName = document.getElementById('userName').value || "Tân DTU";
        isAdmin = isCreate;
        roomCode = isCreate ? Math.floor(100000 + Math.random() * 900000).toString() : document.getElementById('roomInput').value;
        if(!roomCode) return;

        try {
            localStream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: { ideal: 640 }, height: { ideal: 360 } }, 
                audio: { echoCancellation: true, noiseSuppression: true } 
            });
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            document.getElementById('room-display').innerText = roomCode;
            addVideo('me', localStream, myName + " (Bạn)");
            initPeer();
        } catch (e) { alert("Lỗi: Hãy cấp quyền Camera/Mic và tắt các ứng dụng chạy đè màn hình!"); }
    }

    function initPeer() {
        const config = { config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }, { 'urls': 'stun:stun1.l.google.com:19302' }] } };
        const myId = isAdmin ? `DTU-${roomCode}-ADMIN` : `DTU-${roomCode}-${Math.random().toString(36).substr(2, 5)}`;
        peer = new Peer(myId, config);

        peer.on('open', id => {
            if (!isAdmin) {
                const adminId = `DTU-${roomCode}-ADMIN`;
                const conn = peer.connect(adminId);
                setupData(conn);
                peer.call(adminId, localStream);
            }
        });

        peer.on('call', call => {
            call.answer(localStream);
            call.on('stream', stream => addVideo(call.peer, stream, "Thành viên"));
            call.on('close', () => removeVideo(call.peer));
        });

        peer.on('connection', conn => {
            setupData(conn);
            if (isAdmin) {
                peersInRoom.add(conn.peer);
                broadcast({ type: 'new-peer-list', peers: Array.from(peersInRoom) });
            }
        });
    }

    function setupData(conn) {
        conns[conn.peer] = conn;
        conn.on('data', data => {
            if (data.type === 'chat') {
                displayChat(data.user, data.msg, false);
                if (isAdmin) broadcast(data, conn.peer);
            }
            if (data.type === 'new-peer-list' && !isAdmin) {
                data.peers.forEach(peerId => {
                    if (peerId !== peer.id && !conns[peerId]) {
                        const newConn = peer.connect(peerId);
                        setupData(newConn);
                        peer.call(peerId, localStream);
                    }
                });
            }
        });
        conn.on('close', () => removeVideo(conn.peer));
    }

    function addVideo(id, stream, label) {
        if (document.getElementById(`wrap-${id}`)) return;
        const grid = document.getElementById('video-grid');
        const wrap = document.createElement('div');
        wrap.className = 'video-wrapper';
        wrap.id = `wrap-${id}`;
        const isShare = id.includes('share');
        wrap.innerHTML = `<video id="vid-${id}" autoplay playsinline style="width:100%; height:100%; object-fit:${isShare?'contain':'cover'}"></video>
                          <div style="position:absolute; bottom:5px; left:8px; background:rgba(0,0,0,0.6); padding:2px 8px; border-radius:5px; font-size:10px;">${label}</div>`;
        grid.appendChild(wrap);
        document.getElementById(`vid-${id}`).srcObject = stream;
        detectVoice(stream, id);
        updateCount();
    }

    function removeVideo(id) {
        const el = document.getElementById(`wrap-${id}`);
        if(el) el.remove();
        delete conns[id];
        peersInRoom.delete(id);
        updateCount();
    }

    function broadcast(data, exclude) {
        for (let id in conns) if (id !== exclude) conns[id].send(data);
    }

    function sendChat() {
        const input = document.getElementById('chatInput');
        if (!input.value) return;
        const data = { type: 'chat', user: myName, msg: input.value };
        displayChat(myName, input.value, true);
        if (isAdmin) broadcast(data);
        else if (conns[`DTU-${roomCode}-ADMIN`]) conns[`DTU-${roomCode}-ADMIN`].send(data);
        input.value = "";
    }

    function displayChat(user, msg, isMe) {
        const chatBox = document.getElementById('chat-messages');
        const div = document.createElement('div');
        div.className = `msg ${isMe ? 'msg-me' : 'msg-them'}`;
        div.innerHTML = `<b>${isMe?'Bạn':user}:</b> ${msg}`;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function toggleShare() {
        try {
            const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            addVideo('share-me', stream, "Bạn đang chia sẻ");
            for (let id in conns) peer.call(id, stream);
            stream.getVideoTracks()[0].onended = () => removeVideo('share-me');
        } catch (e) { alert("Lưu ý: Điện thoại có thể không hỗ trợ chia sẻ màn hình qua trình duyệt."); }
    }

    function detectVoice(stream, id) {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const analyser = audioCtx.createAnalyser();
        audioCtx.createMediaStreamSource(stream).connect(analyser);
        const data = new Uint8Array(analyser.frequencyBinCount);
        const frame = () => {
            analyser.getByteFrequencyData(data);
            let vol = data.reduce((a, b) => a + b) / data.length;
            const wrap = document.getElementById(`wrap-${id}`);
            if (wrap) { wrap.classList.toggle('speaking', vol > 30); requestAnimationFrame(frame); }
        };
        frame();
    }

    function updateCount() { document.getElementById('user-count').innerText = document.querySelectorAll('.video-wrapper').length; }
    function toggleChat() { document.getElementById('chat-section').classList.toggle('hidden'); }
    function copyRoom() { navigator.clipboard.writeText(roomCode); alert("Đã copy mã!"); }
    function toggleMic() { localStream.getAudioTracks()[0].enabled = !localStream.getAudioTracks()[0].enabled; document.getElementById('micBtn').classList.toggle('active'); }
    function toggleCam() { localStream.getVideoTracks()[0].enabled = !localStream.getVideoTracks()[0].enabled; document.getElementById('camBtn').classList.toggle('active'); }
</script>
</body>
</html>
