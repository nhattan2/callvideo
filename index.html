<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SECURE CONNECT - PRIVATE BRIDGE</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #0a192f; --gold: #ffd700; --navy: #112240; --cyan: #64ffda; --red: #ff4d4d; --gray: #233554; --green: #2ecc71; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; user-select: none; }
        body { background: var(--bg); color: #e6f1ff; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        #video-grid { flex: 1; display: flex; flex-wrap: wrap; gap: 12px; padding: 75px 15px 15px 15px; align-content: center; justify-content: center; overflow-y: auto; }
        .video-wrapper { position: relative; background: #000; border-radius: 12px; overflow: hidden; aspect-ratio: 16/9; border: 2px solid var(--gray); width: 100%; max-width: 420px; transition: 0.3s; }
        .speaking { border-color: var(--gold) !important; box-shadow: 0 0 15px var(--gold); }

        .toolbar { 
            height: 85px; background: var(--navy); display: flex; justify-content: center; align-items: center; gap: 12px; 
            border-top: 1px solid var(--gray); padding-bottom: env(safe-area-inset-bottom);
        }
        .btn-tool { position: relative; width: 46px; height: 46px; border-radius: 50%; border: none; cursor: pointer; background: var(--gray); color: white; font-size: 20px; display: flex; align-items: center; justify-content: center; }
        .btn-tool.off { background: var(--red); }
        .btn-tool.active { background: var(--green); box-shadow: 0 0 10px var(--green); }
        
        #chat-badge { 
            position: absolute; top: -5px; right: -5px; background: var(--red); color: white; 
            font-size: 10px; min-width: 18px; height: 18px; border-radius: 50%; 
            display: none; align-items: center; justify-content: center; border: 2px solid var(--navy);
        }

        #chat-section { width: 320px; display: flex; flex-direction: column; background: var(--navy); border-left: 1px solid var(--gray); transition: 0.3s; }
        #chat-section.hidden { width: 0; overflow: hidden; border: none; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 8px 12px; border-radius: 15px; font-size: 13px; max-width: 85%; word-wrap: break-word; }
        .msg-me { align-self: flex-end; background: var(--cyan); color: var(--bg); }
        .msg-them { align-self: flex-start; background: var(--gray); color: white; }

        .reaction-overlay {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            font-size: 60px; pointer-events: none; z-index: 10;
            animation: reactionLife 10s ease-in-out forwards;
        }
        @keyframes reactionLife { 
            0% { transform: scale(0); opacity: 0; } 
            5% { transform: scale(1.2); opacity: 1; }
            10% { transform: scale(1); }
            90% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.5); opacity: 0; } 
        }

        #icon-menu { 
            position: absolute; bottom: 90px; background: var(--navy); border: 1px solid var(--cyan); 
            padding: 12px; border-radius: 20px; display: none; gap: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            flex-wrap: wrap; max-width: 250px; justify-content: center;
        }
        .icon-item { cursor: pointer; font-size: 26px; }

        @media (max-width: 768px) { #chat-section { position: fixed; inset: 0; width: 100%; z-index: 2000; } }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="home-screen" style="position:fixed; inset:0; background:var(--bg); z-index:5000; display:flex; align-items:center; justify-content:center; padding:20px;">
    <div style="background:var(--navy); padding:25px; border-radius:20px; width:100%; max-width:360px; border:1px solid var(--cyan); text-align:center;">
        <h2 style="color:var(--gold); margin-bottom: 20px;">PRIVATE BRIDGE</h2>
        <input type="text" id="userName" autocomplete="off" spellcheck="false" placeholder="Identity..." style="width:100%; padding:12px; margin-bottom:12px; border-radius:8px; border:none; background:#0d1b2a; color:white; outline:none;">
        <button onclick="startApp(true)" style="width:100%; padding:12px; background:var(--cyan); border:none; border-radius:8px; font-weight:bold; cursor:pointer;">CREATE BRIDGE</button>
        <div style="margin:10px 0; opacity:0.5;">-- ACCESS --</div>
        <input type="text" id="roomInput" autocomplete="off" spellcheck="false" inputmode="numeric" placeholder="6-digit code..." style="width:100%; padding:12px; margin-bottom:12px; border-radius:8px; border:none; background:#0d1b2a; color:white; outline:none;">
        <button onclick="startApp(false)" style="width:100%; padding:12px; background:transparent; border:1px solid var(--cyan); color:var(--cyan); border-radius:8px; cursor:pointer;">JOIN BRIDGE</button>
    </div>
</div>

<div id="app-container" style="display:none; height:100vh; flex-direction:row; position:relative;">
    <div id="video-section" style="flex:1; display:flex; flex-direction:column; position:relative;">
        <div style="position:absolute; top:15px; left:15px; right:15px; display:flex; justify-content:space-between; z-index:100; pointer-events:none;">
            <div style="background:rgba(17,34,64,0.9); padding:10px 18px; border-radius:10px; border:1px solid var(--cyan); color:var(--gold); pointer-events:auto; font-weight:bold; cursor:pointer;" onclick="copyCode()">🔑: <span id="room-display">------</span></div>
            <div style="background:rgba(17,34,64,0.9); padding:10px 18px; border-radius:10px; border:1px solid var(--cyan); color:white;">👥 <span id="user-count">1</span></div>
        </div>
        
        <div id="video-grid"></div>

        <div id="icon-menu">
            <span class="icon-item" onclick="sendReaction('❤️')">❤️</span>
            <span class="icon-item" onclick="sendReaction('😂')">😂</span>
            <span class="icon-item" onclick="sendReaction('👍')">👍</span>
            <span class="icon-item" onclick="sendReaction('🔥')">🔥</span>
            <span class="icon-item" onclick="sendReaction('🎉')">🎉</span>
            <span class="icon-item" onclick="sendReaction('😮')">😮</span>
            <span class="icon-item" onclick="sendReaction('😢')">😢</span>
            <span class="icon-item" onclick="sendReaction('👏')">👏</span>
        </div>

        <div class="toolbar">
            <button class="btn-tool" id="micBtn" onclick="toggleMic()">🎤</button>
            <button class="btn-tool" id="noiseBtn" onclick="toggleNoiseSuppression()" title="Lọc tiếng ồn & tiếng vang">🔇</button>
            <button class="btn-tool" id="camBtn" onclick="toggleCam()">📷</button>
            <button class="btn-tool" onclick="toggleChat()">
                💬 <div id="chat-badge">0</div>
            </button>
            <button class="btn-tool" id="reactionBtn" onclick="toggleIconMenu()">😊</button>
            <button onclick="location.reload()" style="background:var(--red); color:white; border:none; padding:10px 20px; border-radius:20px; font-weight:bold; cursor:pointer;">DISCONNECT</button>
        </div>
    </div>

    <div id="chat-section" class="hidden">
        <div style="padding:15px; font-weight:bold; border-bottom:1px solid var(--gray); display:flex; justify-content:space-between; color:var(--cyan);">
            <span>SECURE CHAT</span>
            <span onclick="toggleChat()" style="cursor:pointer; color:var(--red);">X</span>
        </div>
        <div id="chat-messages"></div>
        <div style="padding:15px; display:flex; gap:8px; border-top:1px solid var(--gray);">
            <input type="text" id="chatInput" autocomplete="off" spellcheck="false" onkeydown="if(event.key==='Enter') sendChat()" placeholder="Secure message..." style="flex:1; padding:10px; border-radius:20px; border:none; background:var(--gray); color:white; outline:none;">
            <button onclick="sendChat()" style="background:var(--cyan); border:none; border-radius:50%; width:40px; height:40px; cursor:pointer;">➤</button>
        </div>
    </div>
</div>

<script>
    let localStream, peer, myName, roomCode, isAdmin = false;
    let unreadCount = 0;
    let isNoiseSuppressed = false;
    const conns = {}; 
    const calls = {};

    async function startApp(isCreate) {
        myName = document.getElementById('userName').value || "Anonymous";
        isAdmin = isCreate;
        roomCode = isCreate ? Math.floor(100000 + Math.random() * 900000).toString() : document.getElementById('roomInput').value;
        if(!roomCode) return;

        try {
            // Cấu hình audio mặc định với khả năng chống vọng (Echo Cancellation)
            localStream = await navigator.mediaDevices.getUserMedia({ 
                video: true, 
                audio: { 
                    echoCancellation: true, 
                    noiseSuppression: true, 
                    autoGainControl: true,
                    googEchoCancellation: true, // Hỗ trợ cho Chrome cũ
                    googNoiseSuppression: true
                } 
            });
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            document.getElementById('room-display').innerText = roomCode;
            addVideo('me', localStream, myName + " (You)");
            initPeer();
        } catch (e) { alert("Access Denied: Camera/Mic required!"); }
    }

    async function toggleNoiseSuppression() {
        if (!localStream) return;
        
        isNoiseSuppressed = !isNoiseSuppressed;
        const btn = document.getElementById('noiseBtn');
        btn.classList.toggle('active', isNoiseSuppressed);
        btn.innerText = isNoiseSuppressed ? '🔊' : '🔇';

        try {
            // Cấu hình âm thanh tối ưu để loại bỏ tiếng vang khi bật lọc
            const audioConstraints = {
                echoCancellation: true,
                noiseSuppression: isNoiseSuppressed,
                autoGainControl: isNoiseSuppressed,
                googEchoCancellation: true,
                googNoiseSuppression: true,
                channelCount: 1
            };

            const newStream = await navigator.mediaDevices.getUserMedia({ audio: audioConstraints, video: false });
            const newTrack = newStream.getAudioTracks()[0];
            
            const oldTrack = localStream.getAudioTracks()[0];
            localStream.removeTrack(oldTrack);
            localStream.addTrack(newTrack);
            oldTrack.stop();

            for (let peerId in calls) {
                const sender = calls[peerId].peerConnection.getSenders().find(s => s.track.kind === 'audio');
                if (sender) sender.replaceTrack(newTrack);
            }
        } catch (e) { console.error("Filter Toggle Failed", e); }
    }

    function initPeer() {
        const myId = isAdmin ? `SC-${roomCode}-MASTER` : `SC-${roomCode}-${Math.random().toString(36).substr(2, 5)}`;
        peer = new Peer(myId);

        peer.on('open', id => {
            if (!isAdmin) {
                const adminId = `SC-${roomCode}-MASTER`;
                const conn = peer.connect(adminId);
                setupData(conn);
                peer.call(adminId, localStream);
            }
        });

        peer.on('call', call => {
            call.answer(localStream);
            setupCall(call);
        });

        peer.on('connection', conn => {
            setupData(conn);
            if (isAdmin) {
                peer.call(conn.peer, localStream);
                broadcast({ type: 'new-peer', peerId: conn.peer }, conn.peer);
            }
        });
    }

    function setupCall(call) {
        calls[call.peer] = call;
        call.on('stream', stream => addVideo(call.peer, stream, "Node"));
        call.on('close', () => removeVideo(call.peer));
    }

    function setupData(conn) {
        conns[conn.peer] = conn;
        conn.on('data', data => {
            if (data.type === 'chat') {
                displayChat(data.user, data.msg, false);
                if (isAdmin) broadcast(data, conn.peer);
            }
            if (data.type === 'reaction') {
                showReaction(conn.peer, data.icon);
                if (isAdmin) broadcast(data, conn.peer);
            }
            if (data.type === 'new-peer' && !isAdmin) {
                peer.call(data.peerId, localStream);
                const newConn = peer.connect(data.peerId);
                setupData(newConn);
            }
        });
        conn.on('close', () => removeVideo(conn.peer));
    }

    function addVideo(id, stream, label) {
        if (document.getElementById(`wrap-${id}`)) return;
        const grid = document.getElementById('video-grid');
        const wrap = document.createElement('div');
        wrap.className = 'video-wrapper';
        wrap.id = `wrap-${id}`;
        wrap.innerHTML = `<video id="vid-${id}" autoplay playsinline style="width:100%; height:100%; object-fit:cover"></video>
                          <div style="position:absolute; bottom:8px; left:12px; background:rgba(0,0,0,0.6); padding:4px 10px; border-radius:8px; font-size:11px;">${label}</div>
                          <div id="react-${id}" style="position:absolute; inset:0; pointer-events:none;"></div>`;
        grid.appendChild(wrap);
        document.getElementById(`vid-${id}`).srcObject = stream;
        detectVoice(stream, id);
        updateCount();
    }

    function removeVideo(id) {
        const el = document.getElementById(`wrap-${id}`);
        if(el) el.remove();
        delete conns[id];
        delete calls[id];
        updateCount();
    }

    function broadcast(data, exclude) {
        for (let id in conns) if (id !== exclude) conns[id].send(data);
    }

    function toggleIconMenu() {
        const menu = document.getElementById('icon-menu');
        menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
    }

    function sendReaction(icon) {
        showReaction('me', icon);
        const data = { type: 'reaction', icon: icon };
        if (isAdmin) broadcast(data);
        else if (conns[`SC-${roomCode}-MASTER`]) conns[`SC-${roomCode}-MASTER`].send(data);
        toggleIconMenu();
    }

    function showReaction(peerId, icon) {
        const target = document.getElementById(`react-${peerId}`);
        if (target) {
            const div = document.createElement('div');
            div.className = 'reaction-overlay';
            div.innerText = icon;
            target.appendChild(div);
            setTimeout(() => div.remove(), 10000);
        }
    }

    function sendChat() {
        const input = document.getElementById('chatInput');
        if (!input.value.trim()) return;
        const data = { type: 'chat', user: myName, msg: input.value };
        displayChat(myName, input.value, true);
        if (isAdmin) broadcast(data);
        else if (conns[`SC-${roomCode}-MASTER`]) conns[`SC-${roomCode}-MASTER`].send(data);
        input.value = "";
    }

    function displayChat(user, msg, isMe) {
        const chatBox = document.getElementById('chat-messages');
        const isChatHidden = document.getElementById('chat-section').classList.contains('hidden');
        if (isChatHidden && !isMe) {
            unreadCount++;
            const badge = document.getElementById('chat-badge');
            badge.innerText = unreadCount;
            badge.style.display = 'flex';
        }
        const div = document.createElement('div');
        div.className = `msg ${isMe ? 'msg-me' : 'msg-them'}`;
        div.innerHTML = `<b>${isMe?'You':user}:</b> ${msg}`;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function toggleChat() { 
        const chatSection = document.getElementById('chat-section');
        chatSection.classList.toggle('hidden');
        if (!chatSection.classList.contains('hidden')) {
            unreadCount = 0;
            document.getElementById('chat-badge').style.display = 'none';
        }
    }

    function detectVoice(stream, id) {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const analyser = audioCtx.createAnalyser();
            const source = audioCtx.createMediaStreamSource(stream);
            source.connect(analyser);
            analyser.fftSize = 256;
            const data = new Uint8Array(analyser.frequencyBinCount);
            const frame = () => {
                analyser.getByteFrequencyData(data);
                let vol = data.reduce((a, b) => a + b) / data.length;
                const wrap = document.getElementById(`wrap-${id}`);
                if (wrap) { wrap.classList.toggle('speaking', vol > 35); requestAnimationFrame(frame); }
            };
            frame();
        } catch(e) {}
    }

    function toggleMic() { localStream.getAudioTracks()[0].enabled = !localStream.getAudioTracks()[0].enabled; document.getElementById('micBtn').classList.toggle('off', !localStream.getAudioTracks()[0].enabled); }
    function toggleCam() { localStream.getVideoTracks()[0].enabled = !localStream.getVideoTracks()[0].enabled; document.getElementById('camBtn').classList.toggle('off', !localStream.getVideoTracks()[0].enabled); }
    function updateCount() { document.getElementById('user-count').innerText = document.querySelectorAll('.video-wrapper').length; }
    function copyCode() { navigator.clipboard.writeText(roomCode); alert("Bridge Code Copied!"); }
</script>
</body>
</html>
