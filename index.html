<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DTU MEET Pro - Voice & Fix Sync</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #0a192f; --gold: #ffd700; --navy: #112240; --cyan: #64ffda; --red: #ff4d4d; --gray: #233554; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; user-select: none; }
        body { background: var(--bg); color: #e6f1ff; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        #video-grid { flex: 1; display: flex; flex-wrap: wrap; gap: 15px; padding: 75px 15px 15px 15px; align-content: center; justify-content: center; overflow-y: auto; }
        .video-wrapper { position: relative; background: #000; border-radius: 15px; overflow: hidden; aspect-ratio: 16/9; border: 3px solid var(--gray); width: 100%; max-width: 450px; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        
        /* Hiệu ứng sóng âm khi nói */
        .speaking { border-color: var(--gold) !important; box-shadow: 0 0 20px var(--gold); }
        .voice-indicator { position: absolute; top: 10px; right: 10px; color: var(--gold); font-size: 12px; display: none; font-weight: bold; animation: blink 0.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .avatar { width: 80px; height: 80px; background: var(--gray); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; color: var(--cyan); border: 2px solid var(--cyan); }

        .toolbar { height: 85px; background: var(--navy); display: flex; justify-content: center; align-items: center; gap: 12px; border-top: 1px solid var(--gray); padding-bottom: env(safe-area-inset-bottom); }
        .btn-tool { width: 46px; height: 46px; border-radius: 50%; border: none; cursor: pointer; background: var(--gray); color: white; font-size: 20px; position: relative; display: flex; align-items: center; justify-content: center; }
        .btn-tool.off { background: var(--red); }
        
        #chat-badge { position: absolute; top: -5px; right: -5px; background: var(--red); color: white; font-size: 10px; width: 18px; height: 18px; border-radius: 50%; display: none; align-items: center; justify-content: center; }

        #chat-section { width: 320px; display: flex; flex-direction: column; background: var(--navy); border-left: 1px solid var(--gray); transition: 0.3s; }
        #chat-section.hidden { width: 0; overflow: hidden; border: none; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 8px 12px; border-radius: 15px; font-size: 13px; max-width: 85%; }
        .msg-me { align-self: flex-end; background: var(--cyan); color: var(--bg); }
        .msg-them { align-self: flex-start; background: var(--gray); color: white; }

        @media (max-width: 768px) { #chat-section { position: fixed; inset: 0; width: 100%; z-index: 2000; } }
    </style>
</head>
<body>

<audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

<div id="home-screen" style="position:fixed; inset:0; background:var(--bg); z-index:5000; display:flex; align-items:center; justify-content:center; padding:20px;">
    <div style="background:var(--navy); padding:25px; border-radius:20px; width:100%; max-width:360px; border:1px solid var(--cyan); text-align:center;">
        <h2 style="color:var(--gold); margin-bottom: 20px;">DTU MEET PRO</h2>
        <input type="text" id="userName" placeholder="Tên bạn..." style="width:100%; padding:12px; margin-bottom:12px; border-radius:8px; border:none; background:#0d1b2a; color:white;">
        
        <div style="display:flex; gap:10px; margin-bottom:12px;">
            <select id="callMode" style="flex:1; padding:10px; border-radius:8px; background:#0d1b2a; color:white; border:1px solid var(--gray);">
                <option value="video">🎥 Video</option>
                <option value="voice">📞 Thoại</option>
            </select>
            <select id="meetingTimer" style="flex:1; padding:10px; border-radius:8px; background:#0d1b2a; color:white; border:1px solid var(--gray);">
                <option value="0">⏳ Vô hạn</option>
                <option value="60">60 phút</option>
            </select>
        </div>

        <button onclick="startApp(true)" style="width:100%; padding:12px; background:var(--cyan); border:none; border-radius:8px; font-weight:bold; cursor:pointer;">TẠO PHÒNG</button>
        <div style="margin:10px 0; opacity:0.5;">-- HOẶC --</div>
        <input type="text" id="roomInput" inputmode="numeric" placeholder="Mã 6 số..." style="width:100%; padding:12px; margin-bottom:12px; border-radius:8px; border:none; background:#0d1b2a; color:white;">
        <button onclick="startApp(false)" style="width:100%; padding:12px; background:transparent; border:1px solid var(--cyan); color:var(--cyan); border-radius:8px; cursor:pointer;">VÀO PHÒNG</button>
    </div>
</div>

<div id="app-container" style="display:none; height:100vh; flex-direction:row;">
    <div id="video-section" style="flex:1; display:flex; flex-direction:column; position:relative;">
        <div style="position:absolute; top:15px; left:15px; right:15px; display:flex; justify-content:space-between; z-index:100; pointer-events:none;">
            <div style="background:rgba(17,34,64,0.9); padding:10px 18px; border-radius:10px; border:1px solid var(--cyan); color:var(--gold); pointer-events:auto; font-weight:bold;" onclick="copyCode()">🔑: <span id="room-display">------</span></div>
            <div id="timer-display" style="color:var(--red); font-weight:bold; background:rgba(0,0,0,0.5); padding:5px 10px; border-radius:8px; display:none;">00:00</div>
            <div style="background:rgba(17,34,64,0.9); padding:10px 18px; border-radius:10px; border:1px solid var(--cyan); color:white;">👥 <span id="user-total">1</span></div>
        </div>
        <div id="video-grid"></div>
        <div class="toolbar">
            <button class="btn-tool" id="micBtn" onclick="toggleMic()">🎤</button>
            <button class="btn-tool" id="camBtn" onclick="toggleCam()">📷</button>
            <button class="btn-tool" onclick="toggleChat()">💬 <div id="chat-badge">0</div></button>
            <button class="btn-tool" id="shareBtn" onclick="toggleShare()">🖥️</button>
            <button onclick="location.reload()" style="background:var(--red); color:white; border:none; padding:10px 20px; border-radius:20px; font-weight:bold; cursor:pointer;">RỜI PHÒNG</button>
        </div>
    </div>
    <div id="chat-section" class="hidden">
        <div style="padding:15px; font-weight:bold; border-bottom:1px solid var(--gray); display:flex; justify-content:space-between; color:var(--cyan);">
            <span>CHAT BOX</span>
            <span onclick="toggleChat()" style="cursor:pointer; color:var(--red);">[X]</span>
        </div>
        <div id="chat-messages"></div>
        <div style="padding:15px; display:flex; gap:8px; border-top:1px solid var(--gray);">
            <input type="text" id="chatInput" placeholder="Nhập tin..." style="flex:1; padding:10px; border-radius:20px; border:none; background:var(--gray); color:white; outline:none;">
            <button onclick="sendChat()" style="background:var(--cyan); border:none; border-radius:50%; width:40px; height:40px; cursor:pointer;">➤</button>
        </div>
    </div>
</div>

<script>
    let localStream, peer, myName, roomCode, isAdmin = false, unreadCount = 0, isVoiceOnly = false;
    const conns = {}, calls = {};

    async function startApp(isCreate) {
        myName = document.getElementById('userName').value || "User";
        isAdmin = isCreate;
        isVoiceOnly = document.getElementById('callMode').value === 'voice';
        roomCode = isCreate ? Math.floor(100000 + Math.random() * 900000).toString() : document.getElementById('roomInput').value;
        if(!roomCode) return;

        try {
            localStream = await navigator.mediaDevices.getUserMedia({ 
                video: !isVoiceOnly, 
                audio: { echoCancellation: true, noiseSuppression: true } 
            });
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            document.getElementById('room-display').innerText = roomCode;
            
            addVideo('me', localStream, myName + " (Bạn)");
            initPeer();
        } catch (e) { alert("Lỗi thiết bị!"); }
    }

    function initPeer() {
        peer = new Peer(isAdmin ? `DTU-${roomCode}-ADMIN` : `DTU-${roomCode}-${Math.random().toString(36).substr(2, 5)}`, {
            config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] }
        });

        peer.on('open', id => {
            if (!isAdmin) {
                const adminId = `DTU-${roomCode}-ADMIN`;
                const conn = peer.connect(adminId);
                setupData(conn);
                peer.call(adminId, localStream);
            }
        });
        peer.on('call', call => { call.answer(localStream); setupCall(call); });
        peer.on('connection', conn => { 
            setupData(conn); 
            if (isAdmin) {
                peer.call(conn.peer, localStream);
                broadcast({ type: 'sync-mesh', peerId: conn.peer }, conn.peer);
            }
        });
    }

    function setupCall(call) {
        calls[call.peer] = call;
        call.on('stream', stream => addVideo(call.peer, stream, "Thành viên"));
        call.on('close', () => removeVideo(call.peer));
    }

    function setupData(conn) {
        conns[conn.peer] = conn;
        conn.on('data', data => {
            if (data.type === 'chat') handleChat(data);
            if (data.type === 'stop-share') removeVideo(data.peerId);
            if (data.type === 'sync-mesh' && !isAdmin) {
                peer.call(data.peerId, localStream);
                const newConn = peer.connect(data.peerId);
                setupData(newConn);
            }
        });
        conn.on('close', () => removeVideo(conn.peer));
    }

    function addVideo(id, stream, label) {
        if (document.getElementById(`wrap-${id}`)) return;
        const grid = document.getElementById('video-grid');
        const wrap = document.createElement('div');
        wrap.className = 'video-wrapper';
        wrap.id = `wrap-${id}`;
        
        const isShare = id.includes('share');
        const hasVideo = stream.getVideoTracks().length > 0 && !isVoiceOnly;

        if (!hasVideo && !isShare) {
            wrap.innerHTML = `<div class="avatar">${label.charAt(0)}</div>`;
        } else {
            wrap.innerHTML = `<video id="vid-${id}" autoplay playsinline style="width:100%; height:100%; object-fit:${isShare?'contain':'cover'}"></video>`;
        }
        
        wrap.innerHTML += `<div class="voice-indicator" id="voice-${id}">● ĐANG NÓI</div>
                           <div style="position:absolute; bottom:8px; left:12px; background:rgba(0,0,0,0.6); padding:4px 10px; border-radius:8px; font-size:11px;">${label}</div>`;
        
        grid.appendChild(wrap);
        if (document.getElementById(`vid-${id}`)) document.getElementById(`vid-${id}`).srcObject = stream;
        detectVoice(stream, id);
        updateCount();
    }

    function removeVideo(id) {
        const el = document.getElementById(`wrap-${id}`);
        if(el) el.remove();
        delete conns[id]; delete calls[id];
        updateCount();
    }

    async function toggleShare() {
        try {
            const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            const shareId = `share-${peer.id}`;
            addVideo(shareId, stream, "Màn hình share");
            for (let id in conns) peer.call(id, stream);
            
            stream.getVideoTracks()[0].onended = () => {
                removeVideo(shareId);
                broadcast({ type: 'stop-share', peerId: shareId });
            };
        } catch (e) {}
    }

    function detectVoice(stream, id) {
        const ctx = new AudioContext();
        const ana = ctx.createAnalyser();
        ctx.createMediaStreamSource(stream).connect(ana);
        const d = new Uint8Array(ana.frequencyBinCount);
        const f = () => {
            ana.getByteFrequencyData(d);
            let v = d.reduce((a,b)=>a+b)/d.length;
            const w = document.getElementById(`wrap-${id}`);
            const ind = document.getElementById(`voice-${id}`);
            if(w) { 
                w.classList.toggle('speaking', v > 35); 
                if(ind) ind.style.display = v > 35 ? 'block' : 'none';
                requestAnimationFrame(f); 
            }
        }; f();
    }

    function handleChat(data) {
        displayChat(data.user, data.msg, false);
        if (document.getElementById('chat-section').classList.contains('hidden')) {
            unreadCount++;
            document.getElementById('chat-badge').innerText = unreadCount;
            document.getElementById('chat-badge').style.display = 'flex';
            document.getElementById('notif-sound').play().catch(()=>{});
        }
        if (isAdmin) broadcast(data, data.from);
    }

    function sendChat() {
        const input = document.getElementById('chatInput');
        if (!input.value) return;
        const data = { type: 'chat', user: myName, msg: input.value, from: peer.id };
        displayChat(myName, input.value, true);
        broadcast(data);
        input.value = "";
    }

    document.getElementById('chatInput').onkeypress = e => { if(e.key === 'Enter') sendChat(); };
    function broadcast(data, ex) { for(let id in conns) if(id !== ex) conns[id].send(data); }
    function displayChat(u, m, me) { 
        const b = document.getElementById('chat-messages');
        const d = document.createElement('div');
        d.className = `msg ${me?'msg-me':'msg-them'}`;
        d.innerHTML = `<b>${me?'Bạn':u}:</b> ${m}`;
        b.appendChild(d); b.scrollTop = b.scrollHeight;
    }
    function toggleChat() { 
        document.getElementById('chat-section').classList.toggle('hidden'); 
        if(!document.getElementById('chat-section').classList.contains('hidden')) {
            unreadCount = 0; document.getElementById('chat-badge').style.display = 'none';
        }
    }
    function toggleMic() { localStream.getAudioTracks()[0].enabled = !localStream.getAudioTracks()[0].enabled; document.getElementById('micBtn').classList.toggle('off', !localStream.getAudioTracks()[0].enabled); }
    function toggleCam() { if(localStream.getVideoTracks()[0]) { localStream.getVideoTracks()[0].enabled = !localStream.getVideoTracks()[0].enabled; document.getElementById('camBtn').classList.toggle('off', !localStream.getVideoTracks()[0].enabled); } }
    function updateCount() { document.getElementById('user-total').innerText = document.querySelectorAll('.video-wrapper').length; }
    function copyCode() { navigator.clipboard.writeText(roomCode); alert("Đã copy!"); }
</script>
</body>
</html>
