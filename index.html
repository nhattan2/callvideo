<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DTU MEET Pro - Full Mesh Sync</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #0a192f; --gold: #ffd700; --navy: #112240; --cyan: #64ffda; --red: #ff4d4d; --gray: #233554; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; user-select: none; }
        body { background: var(--bg); color: #e6f1ff; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        #video-grid { flex: 1; display: flex; flex-wrap: wrap; gap: 15px; padding: 80px 20px 20px 20px; align-content: center; justify-content: center; overflow-y: auto; }
        .video-wrapper { position: relative; background: #000; border-radius: 15px; overflow: hidden; aspect-ratio: 16/9; border: 3px solid var(--gray); width: 100%; max-width: 450px; }
        .speaking { border-color: var(--gold) !important; box-shadow: 0 0 15px var(--gold); }
        
        #chat-section { width: 300px; display: flex; flex-direction: column; background: var(--navy); border-left: 1px solid var(--gray); }
        #chat-section.hidden { width: 0; overflow: hidden; border: none; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 8px 12px; border-radius: 15px; font-size: 13px; max-width: 85%; }
        .msg-me { align-self: flex-end; background: var(--cyan); color: var(--bg); }
        .msg-them { align-self: flex-start; background: var(--gray); color: white; }

        .toolbar { height: 85px; background: var(--navy); display: flex; justify-content: center; align-items: center; gap: 12px; border-top: 1px solid var(--gray); }
        .btn-tool { width: 45px; height: 45px; border-radius: 50%; border: none; cursor: pointer; background: var(--gray); color: white; font-size: 18px; }
        .btn-tool.active { background: var(--red); }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="home-screen" style="position:fixed; inset:0; background:var(--bg); z-index:5000; display:flex; align-items:center; justify-content:center; padding:20px;">
    <div style="background:var(--navy); padding:30px; border-radius:20px; width:100%; max-width:380px; border:1px solid var(--cyan); text-align:center;">
        <h2 style="color:var(--gold);">DTU MEET PRO</h2>
        <input type="text" id="userName" placeholder="Tên của bạn..." style="width:100%; padding:12px; margin:10px 0; border-radius:8px; border:none; background:#0d1b2a; color:white;">
        <button onclick="startApp(true)" style="width:100%; padding:12px; background:var(--cyan); border:none; border-radius:8px; font-weight:bold; cursor:pointer;">TẠO PHÒNG</button>
        <div style="margin:10px 0; opacity:0.5;">-- HOẶC --</div>
        <input type="text" id="roomInput" inputmode="numeric" placeholder="Mã 6 số..." style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:none; background:#0d1b2a; color:white;">
        <button onclick="startApp(false)" style="width:100%; padding:12px; background:transparent; border:1px solid var(--cyan); color:var(--cyan); border-radius:8px; cursor:pointer;">VÀO PHÒNG</button>
    </div>
</div>

<div id="app-container" style="display:none; height:100vh; flex-direction:row;">
    <div id="video-section" style="flex:1; display:flex; flex-direction:column; position:relative;">
        <div style="position:absolute; top:20px; left:20px; right:20px; display:flex; justify-content:space-between; z-index:100; pointer-events:none;">
            <div style="background:rgba(17,34,64,0.9); padding:10px 20px; border-radius:12px; border:1px solid var(--cyan); color:var(--gold); pointer-events:auto; cursor:pointer;" onclick="copyCode()">🔑: <span id="room-display">------</span></div>
            <div style="background:rgba(17,34,64,0.9); padding:10px 20px; border-radius:12px; border:1px solid var(--cyan); color:white;">👥 <span id="user-total">1</span></div>
        </div>
        <div id="video-grid"></div>
        <div class="toolbar">
            <button class="btn-tool" id="micBtn" onclick="toggleMic()">🎤</button>
            <button class="btn-tool" id="camBtn" onclick="toggleCam()">📷</button>
            <button class="btn-tool" onclick="toggleChat()">💬</button>
            <button class="btn-tool" id="shareBtn" onclick="toggleShare()">🖥️</button>
            <button onclick="location.reload()" style="background:var(--red); color:white; border:none; padding:10px 25px; border-radius:25px; cursor:pointer; font-weight:bold;">RỜI PHÒNG</button>
        </div>
    </div>
    <div id="chat-section" class="hidden">
        <div style="padding:15px; font-weight:bold; border-bottom:1px solid var(--gray); color:var(--cyan);">CHAT BOX</div>
        <div id="chat-messages"></div>
        <div style="padding:10px; display:flex; gap:5px; border-top:1px solid var(--gray);">
            <input type="text" id="chatInput" placeholder="Nhắn tin..." style="flex:1; padding:10px; border-radius:20px; border:none; background:var(--gray); color:white; outline:none;">
            <button onclick="sendChat()" style="background:var(--cyan); border:none; border-radius:50%; width:35px; height:35px; cursor:pointer;">➤</button>
        </div>
    </div>
</div>

<script>
    let localStream, peer, myName, roomCode, isAdmin = false;
    const conns = {}; 
    const calls = {};

    async function startApp(isCreate) {
        myName = document.getElementById('userName').value || "Người dùng";
        isAdmin = isCreate;
        roomCode = isCreate ? Math.floor(100000 + Math.random() * 900000).toString() : document.getElementById('roomInput').value;
        if(!roomCode) return;

        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: { echoCancellation: true, noiseSuppression: true } });
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            document.getElementById('room-display').innerText = roomCode;
            addVideo('me', localStream, myName + " (Bạn)");
            initPeer();
        } catch (e) { alert("Lỗi: Hãy cấp quyền Camera/Mic!"); }
    }

    function initPeer() {
        const config = { config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }, { 'urls': 'stun:stun1.l.google.com:19302' }] } };
        const myId = isAdmin ? `DTU-${roomCode}-ADMIN` : `DTU-${roomCode}-${Math.random().toString(36).substr(2, 5)}`;
        peer = new Peer(myId, config);

        peer.on('open', id => {
            if (!isAdmin) {
                const adminId = `DTU-${roomCode}-ADMIN`;
                const conn = peer.connect(adminId);
                setupData(conn);
                const call = peer.call(adminId, localStream);
                setupCall(call);
            }
        });

        peer.on('call', call => {
            call.answer(localStream);
            setupCall(call);
        });

        peer.on('connection', conn => setupData(conn));
    }

    function setupCall(call) {
        calls[call.peer] = call;
        call.on('stream', stream => addVideo(call.peer, stream, "Thành viên"));
        call.on('close', () => removeVideo(call.peer));
    }

    function setupData(conn) {
        conns[conn.peer] = conn;
        conn.on('data', data => {
            if (data.type === 'chat') {
                displayChat(data.user, data.msg, false);
                if (isAdmin) broadcast(data, conn.peer);
            }
        });
        conn.on('close', () => removeVideo(conn.peer));
    }

    function addVideo(id, stream, label) {
        if (document.getElementById(`wrap-${id}`)) return;
        const grid = document.getElementById('video-grid');
        const wrap = document.createElement('div');
        wrap.className = 'video-wrapper';
        wrap.id = `wrap-${id}`;
        const isShare = id.includes('share');
        wrap.innerHTML = `<video id="vid-${id}" autoplay playsinline style="width:100%; height:100%; object-fit:${isShare?'contain':'cover'}"></video>
                          <div style="position:absolute; bottom:8px; left:10px; background:rgba(0,0,0,0.6); padding:3px 10px; border-radius:8px; font-size:11px;">${label}</div>`;
        grid.appendChild(wrap);
        document.getElementById(`vid-${id}`).srcObject = stream;
        detectVoice(stream, id);
        updateUserCount();
    }

    function removeVideo(id) {
        if(document.getElementById(`wrap-${id}`)) document.getElementById(`wrap-${id}`).remove();
        delete conns[id];
        delete calls[id];
        updateUserCount();
    }

    function broadcast(data, exclude) {
        for (let id in conns) if (id !== exclude) conns[id].send(data);
    }

    function sendChat() {
        const input = document.getElementById('chatInput');
        if (!input.value) return;
        const data = { type: 'chat', user: myName, msg: input.value };
        displayChat(myName, input.value, true);
        if (isAdmin) broadcast(data);
        else if (conns[`DTU-${roomCode}-ADMIN`]) conns[`DTU-${roomCode}-ADMIN`].send(data);
        input.value = "";
    }

    function displayChat(user, msg, isMe) {
        const chatBox = document.getElementById('chat-messages');
        const div = document.createElement('div');
        div.className = `msg ${isMe ? 'msg-me' : 'msg-them'}`;
        div.innerHTML = `<b>${isMe?'Bạn':user}:</b> ${msg}`;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // --- LOGIC SHARE MÀN HÌNH BẮT TAY ĐÃ SỬA ---
    async function toggleShare() {
        try {
            const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            addVideo('share-me', stream, "Bạn đang chia sẻ");
            
            // QUAN TRỌNG: Gửi luồng này tới TẤT CẢ mọi người trong phòng qua vòng lặp
            for (let peerId in conns) {
                peer.call(peerId, stream);
            }

            stream.getVideoTracks()[0].onended = () => {
                removeVideo('share-me');
                updateUserCount();
            };
        } catch (e) { console.error("Hủy chia sẻ"); }
    }

    function detectVoice(stream, id) {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const analyser = audioCtx.createAnalyser();
        audioCtx.createMediaStreamSource(stream).connect(analyser);
        const data = new Uint8Array(analyser.frequencyBinCount);
        const frame = () => {
            analyser.getByteFrequencyData(data);
            let vol = data.reduce((a, b) => a + b) / data.length;
            const wrap = document.getElementById(`wrap-${id}`);
            if (wrap) { wrap.classList.toggle('speaking', vol > 35); requestAnimationFrame(frame); }
        };
        frame();
    }

    function updateUserCount() { document.getElementById('user-total').innerText = document.querySelectorAll('.video-wrapper').length; }
    function toggleChat() { document.getElementById('chat-section').classList.toggle('hidden'); }
    function copyCode() { navigator.clipboard.writeText(roomCode); alert("Đã copy mã!"); }
    function toggleMic() { localStream.getAudioTracks()[0].enabled = !localStream.getAudioTracks()[0].enabled; document.getElementById('micBtn').classList.toggle('active', !localStream.getAudioTracks()[0].enabled); }
    function toggleCam() { localStream.getVideoTracks()[0].enabled = !localStream.getVideoTracks()[0].enabled; document.getElementById('camBtn').classList.toggle('active', !localStream.getVideoTracks()[0].enabled); }
</script>
</body>
</html>
