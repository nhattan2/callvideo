<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTU MEET Pro - Full Sync 2026</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #0a192f; --gold: #ffd700; --navy: #112240; --cyan: #64ffda; --red: #ff4d4d; --gray: #233554; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; user-select: none; }
        body { background: var(--bg); color: #e6f1ff; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        #video-grid { flex: 1; display: flex; flex-wrap: wrap; gap: 15px; padding: 80px 20px 20px 20px; align-content: center; justify-content: center; overflow-y: auto; }
        .video-wrapper { position: relative; background: #000; border-radius: 15px; overflow: hidden; aspect-ratio: 16/9; border: 3px solid var(--gray); width: 100%; max-width: 450px; }
        .speaking { border-color: var(--gold) !important; box-shadow: 0 0 15px var(--gold); }
        
        .toolbar { height: 85px; background: var(--navy); display: flex; justify-content: center; align-items: center; gap: 12px; border-top: 1px solid var(--gray); }
        .btn-tool { width: 45px; height: 45px; border-radius: 50%; border: none; cursor: pointer; background: var(--gray); color: white; font-size: 18px; }
        .btn-tool.active { background: var(--red); }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="home-screen" style="position:fixed; inset:0; background:var(--bg); z-index:5000; display:flex; align-items:center; justify-content:center;">
    <div style="background:var(--navy); padding:30px; border-radius:20px; width:380px; border:1px solid var(--cyan); text-align:center;">
        <h2 style="color:var(--gold);">DTU MEET PRO</h2>
        <input type="text" id="userName" placeholder="Tên của bạn..." style="width:100%; padding:12px; margin:10px 0; border-radius:8px; border:none; background:#0d1b2a; color:white;">
        <button onclick="startApp(true)" style="width:100%; padding:12px; background:var(--cyan); border:none; border-radius:8px; font-weight:bold; cursor:pointer;">TẠO PHÒNG</button>
        <div style="margin:10px 0; opacity:0.5;">-- HOẶC --</div>
        <input type="text" id="roomInput" placeholder="Mã 6 số...">
        <button onclick="startApp(false)" style="width:100%; padding:12px; background:transparent; border:1px solid var(--cyan); color:var(--cyan); border-radius:8px; cursor:pointer;">VÀO PHÒNG</button>
    </div>
</div>

<div id="app-container" style="display:none; height:100vh; flex-direction:column;">
    <div style="position:absolute; top:20px; left:20px; right:20px; display:flex; justify-content:space-between; z-index:100; pointer-events:none;">
        <div style="background:rgba(17,34,64,0.9); padding:10px 20px; border-radius:12px; border:1px solid var(--cyan); color:var(--gold); pointer-events:auto; cursor:pointer;" onclick="copyRoom()">🔑 PHÒNG: <span id="room-display">------</span></div>
        <div style="background:rgba(17,34,64,0.9); padding:10px 20px; border-radius:12px; border:1px solid var(--cyan); color:white;">👥 <span id="user-count">1</span> người</div>
    </div>

    <div id="video-grid"></div>

    <div class="toolbar">
        <button class="btn-tool" id="micBtn" onclick="toggleMic()">🎤</button>
        <button class="btn-tool" id="camBtn" onclick="toggleCam()">📷</button>
        <button class="btn-tool" id="shareBtn" onclick="toggleShare()">🖥️</button>
        <button onclick="location.reload()" style="background:var(--red); color:white; border:none; padding:10px 25px; border-radius:25px; cursor:pointer; font-weight:bold;">RỜI PHÒNG</button>
    </div>
</div>

<script>
    let localStream, peer, myName, roomCode, isAdmin = false;
    const currentCalls = {}; 
    const currentConns = {};

    async function startApp(isCreate) {
        myName = document.getElementById('userName').value || "Tân DTU";
        isAdmin = isCreate;
        roomCode = isCreate ? Math.floor(100000 + Math.random() * 900000).toString() : document.getElementById('roomInput').value;
        if(!roomCode) return alert("Nhập mã phòng!");

        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('app-container').style.display = 'flex';
        document.getElementById('room-display').innerText = roomCode;

        addVideo('me', localStream, myName + " (Bạn)");
        initPeer();
    }

    function initPeer() {
        const myId = isAdmin ? `DTU-${roomCode}-ADMIN` : `DTU-${roomCode}-${Math.random().toString(36).substr(2, 5)}`;
        peer = new Peer(myId, { config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] } });

        peer.on('open', id => {
            if (!isAdmin) {
                const adminId = `DTU-${roomCode}-ADMIN`;
                callUser(adminId);
                connectUser(adminId);
            }
        });

        peer.on('call', call => {
            call.answer(localStream);
            handleCall(call);
        });

        peer.on('connection', conn => handleData(conn));

        // Tự động dọn dẹp mỗi 3 giây
        setInterval(cleanUpPeers, 3000);
    }

    function callUser(peerId) {
        const call = peer.call(peerId, localStream);
        handleCall(call);
    }

    function connectUser(peerId) {
        const conn = peer.connect(peerId);
        handleData(conn);
    }

    function handleCall(call) {
        currentCalls[call.peer] = call;
        call.on('stream', stream => addVideo(call.peer, stream, "Thành viên"));
        call.on('close', () => removeVideo(call.peer));
        call.on('error', () => removeVideo(call.peer));
    }

    function handleData(conn) {
        currentConns[conn.peer] = conn;
        conn.on('close', () => removeVideo(conn.peer));
        conn.on('error', () => removeVideo(conn.peer));
    }

    function addVideo(id, stream, label) {
        if (document.getElementById(`wrap-${id}`)) return;
        const grid = document.getElementById('video-grid');
        const wrap = document.createElement('div');
        wrap.className = 'video-wrapper';
        wrap.id = `wrap-${id}`;
        
        const isShare = id.includes('share');
        const style = isShare ? "object-fit: contain; background: #000;" : "object-fit: cover;";

        wrap.innerHTML = `<video id="vid-${id}" autoplay playsinline style="width:100%; height:100%; ${style}"></video>
                          <div style="position:absolute; bottom:10px; left:12px; background:rgba(0,0,0,0.6); padding:4px 12px; border-radius:10px; font-size:11px;">${label}</div>`;
        grid.appendChild(wrap);
        document.getElementById(`vid-${id}`).srcObject = stream;
        detectVoice(stream, id);
        updateUI();
    }

    function removeVideo(id) {
        const el = document.getElementById(`wrap-${id}`);
        if (el) el.remove();
        delete currentCalls[id];
        delete currentConns[id];
        updateUI();
    }

    function cleanUpPeers() {
        for (let id in currentCalls) {
            if (!currentCalls[id].peerConnection || currentCalls[id].peerConnection.connectionState === 'disconnected') {
                removeVideo(id);
            }
        }
    }

    async function toggleShare() {
        try {
            const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            addVideo('share-me', screenStream, "Bạn đang chia sẻ");

            // Gửi stream share cho TẤT CẢ mọi người
            for (let id in currentConns) {
                peer.call(id, screenStream);
            }

            screenStream.getVideoTracks()[0].onended = () => {
                removeVideo('share-me');
                location.reload(); // Reset để tránh lỗi luồng khi share lại
            };
        } catch (e) {}
    }

    function detectVoice(stream, id) {
        const audioCtx = new AudioContext();
        const analyser = audioCtx.createAnalyser();
        audioCtx.createMediaStreamSource(stream).connect(analyser);
        const data = new Uint8Array(analyser.frequencyBinCount);
        const frame = () => {
            analyser.getByteFrequencyData(data);
            let vol = data.reduce((a, b) => a + b) / data.length;
            const wrap = document.getElementById(`wrap-${id}`);
            if (wrap) {
                wrap.classList.toggle('speaking', vol > 35);
                requestAnimationFrame(frame);
            }
        };
        frame();
    }

    function updateUI() { document.getElementById('user-count').innerText = document.querySelectorAll('.video-wrapper').length; }
    function copyRoom() { navigator.clipboard.writeText(roomCode); alert("Đã copy mã phòng!"); }
    function toggleMic() { localStream.getAudioTracks()[0].enabled = !localStream.getAudioTracks()[0].enabled; document.getElementById('micBtn').classList.toggle('active'); }
    function toggleCam() { localStream.getVideoTracks()[0].enabled = !localStream.getVideoTracks()[0].enabled; document.getElementById('camBtn').classList.toggle('active'); }
</script>
</body>
</html>
