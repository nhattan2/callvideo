<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call Meet</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #0a192f; --gold: #ffd700; --navy: #112240; --cyan: #64ffda; --red: #ff4d4d; --gray: #233554; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; user-select: none; } /* Cấm bôi đen toàn trang */
        body { background: var(--bg); color: #e6f1ff; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* GIAO DIỆN CHỜ */
        #home-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .home-box { background: var(--navy); padding: 30px; border-radius: 20px; width: 380px; border: 1px solid var(--cyan); text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--gray); background: #0d1b2a; color: white; outline: none; }
        .btn-main { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; margin: 5px 0; }
        .btn-create { background: var(--cyan); color: var(--bg); }
        .btn-join { background: transparent; color: var(--cyan); border: 1px solid var(--cyan); }

        /* MÀN HÌNH CHÍNH */
        #main-layout { display: none; flex: 1; display: flex; overflow: hidden; }
        #video-section { flex: 1; display: flex; flex-direction: column; }
        #video-grid { flex: 1; display: grid; gap: 15px; padding: 20px; align-content: center; justify-content: center; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
        
        .video-wrapper { position: relative; background: #000; border-radius: 15px; overflow: hidden; aspect-ratio: 16/9; border: 3px solid var(--gray); transition: 0.3s; }
        .speaking { border-color: var(--gold) !important; box-shadow: 0 0 15px var(--gold); }

        /* SIDEBAR CHAT & MEMBERS */
        #side-panel { width: 320px; background: var(--navy); border-left: 1px solid var(--gray); display: none; flex-direction: column; }
        .tab-header { display: flex; border-bottom: 1px solid var(--gray); }
        .tab-btn { flex: 1; padding: 15px; background: none; border: none; color: #8892b0; cursor: pointer; }
        .tab-btn.active { color: var(--cyan); border-bottom: 2px solid var(--cyan); }
        .tab-content { flex: 1; overflow-y: auto; padding: 15px; }
        
        /* CHAT */
        #chat-messages { height: calc(100% - 50px); overflow-y: auto; margin-bottom: 10px; font-size: 14px; }
        .msg { margin-bottom: 8px; padding: 5px 10px; background: var(--gray); border-radius: 8px; width: fit-content; max-width: 90%; }
        
        /* TOOLBAR */
        .toolbar { height: 85px; background: var(--navy); display: flex; justify-content: center; align-items: center; gap: 15px; border-top: 1px solid var(--gray); }
        .btn-tool { width: 50px; height: 50px; border-radius: 50%; border: none; cursor: pointer; background: var(--gray); color: white; font-size: 20px; }
        .btn-tool.off { background: var(--red); }
        
        #timer-display { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; color: var(--gold); font-family: monospace; }
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--cyan); color: var(--bg); padding: 10px 20px; border-radius: 20px; font-weight: bold; display: none; z-index: 3000; }
    </style>
</head>
<body oncontextmenu="return false;"> <div id="toast"></div>

<div id="home-screen">
    <div class="home-box">
        <h2 style="color: var(--gold); margin-top: 0;">CALL MEET</h2>
        <input type="text" id="userName" placeholder="Tên của bạn..." autocomplete="off">
        <button class="btn-main btn-create" onclick="init(true)">TẠO PHÒNG MỚI</button>
        <div style="margin: 10px 0; font-size: 12px; opacity: 0.5;">— HOẶC —</div>
        <input type="text" id="roomInput" placeholder="Nhập mã 6 số..." autocomplete="off">
        <button class="btn-main btn-join" onclick="init(false)">VÀO PHÒNG</button>
    </div>
</div>

<div id="main-layout">
    <div id="video-section">
        <div style="padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: var(--navy);">
            <div><b>PHÒNG:</b> <span id="room-display" style="color:var(--gold);"></span></div>
            <div id="timer-display">00:00</div>
            <div style="cursor:pointer;" onclick="toggleSidebar()">👥 <span id="user-count">1</span> người</div>
        </div>

        <div id="video-grid"></div>

        <div class="toolbar">
            <button class="btn-tool" id="micBtn" onclick="toggleMic()">🎤</button>
            <button class="btn-tool" id="camBtn" onclick="toggleCam()">📷</button>
            <button class="btn-tool" id="shareBtn" onclick="toggleShare()">🖥️</button>
            <button class="btn-tool" onclick="toggleSidebar()">💬</button>
            <button class="btn-tool" onclick="location.reload()" style="background:var(--red); width:70px; border-radius:25px;">📞</button>
        </div>
    </div>

    <div id="side-panel">
        <div class="tab-header">
            <button class="tab-btn active" onclick="switchTab('members')">Thành viên</button>
            <button class="tab-btn" onclick="switchTab('chat')">Chat</button>
        </div>
        <div id="tab-members" class="tab-content">
            <ul id="member-list" style="list-style:none; padding:0;"></ul>
        </div>
        <div id="tab-chat" class="tab-content" style="display:none;">
            <div id="chat-messages"></div>
            <div style="display:flex; gap:5px;">
                <input type="text" id="chatInput" placeholder="Nhập tin nhắn..." autocomplete="off" style="margin:0;">
                <button onclick="sendChatMessage()" style="background:var(--cyan); border:none; padding:10px; border-radius:8px;">➤</button>
            </div>
        </div>
    </div>
</div>

<script>
    let localStream, myName, roomCode, peer, isAdmin = false;
    let startTime = Date.now();
    const connections = {};

    // 1. BẢO MẬT: CHỐNG F12 & SOI CODE
    document.onkeydown = function(e) {
        if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) {
            return false;
        }
    };

    function showToast(m) {
        const t = document.getElementById('toast');
        t.innerText = m; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2500);
    }

    // 2. KHỞI TẠO CUỘC HỌP
    async function init(isCreate) {
        myName = document.getElementById('userName').value;
        if(!myName) return showToast("Vui lòng nhập tên!");
        
        isAdmin = isCreate;
        roomCode = isCreate ? Math.floor(100000 + Math.random() * 900000).toString() : document.getElementById('roomInput').value;
        if(!roomCode || roomCode.length < 6) return showToast("Mã phòng không hợp lệ!");

        try {
            // Lọc tiếng ồn cơ bản qua cài đặt trình duyệt
            localStream = await navigator.mediaDevices.getUserMedia({ 
                video: true, 
                audio: { echoCancellation: true, noiseSuppression: true } 
            });
            
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('main-layout').style.display = 'flex';
            document.getElementById('room-display').innerText = roomCode;

            addVideo('me', localStream, myName + " (Bạn)");
            startClock();
            setupPeer();
        } catch (e) {
            showToast("Lỗi truy cập thiết bị!");
        }
    }

    function setupPeer() {
        peer = new Peer(roomCode + "-" + Math.random().toString(36).substr(2, 5));
        // Lưu ý: Trong thực tế bạn cần 1 Signaling Server để kết nối các Peer lại với nhau.
        // Ở đây giả định logic kết nối qua PeerJS ID.
    }

    // 3. THỜI GIAN & HẸN GIỜ
    function startClock() {
        setInterval(() => {
            let elapsed = Math.floor((Date.now() - startTime) / 1000);
            let m = Math.floor(elapsed / 60);
            let s = elapsed % 60;
            document.getElementById('timer-display').innerText = `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
            
            // Giới hạn 60 phút tự tắt
            if (m >= 60) {
                alert("Cuộc họp tự động kết thúc sau 60 phút!");
                location.reload();
            }
        }, 1000);
    }

    // 4. HIỂN THỊ VIDEO & VOICE DETECTION
    function addVideo(id, stream, label) {
        const grid = document.getElementById('video-grid');
        const wrapper = document.createElement('div');
        wrapper.className = 'video-wrapper';
        wrapper.id = `wrap-${id}`;
        wrapper.innerHTML = `
            <video id="vid-${id}" autoplay playsinline ${id==='me'?'muted style="transform:scaleX(-1)"':''}></video>
            <div style="position:absolute; bottom:10px; left:12px; background:rgba(0,0,0,0.6); padding:4px 10px; border-radius:12px; font-size:12px;">
                <span id="mic-status-${id}">🎤</span> ${label}
            </div>
            ${isAdmin && id !== 'me' ? `<button onclick="remoteMute('${id}')" style="position:absolute; top:10px; right:10px; background:var(--red); border:none; border-radius:5px; color:white; cursor:pointer; font-size:10px;">Tắt hộ</button>` : ''}
        `;
        grid.appendChild(wrapper);
        document.getElementById(`vid-${id}`).srcObject = stream;
        
        // Vòng nhận biết người nói
        detectVoice(stream, id);
        updateMemberList(id, label);
    }

    function detectVoice(stream, id) {
        const audioCtx = new AudioContext();
        const source = audioCtx.createMediaStreamSource(stream);
        const analyser = audioCtx.createAnalyser();
        source.connect(analyser);
        const data = new Uint8Array(analyser.frequencyBinCount);
        function check() {
            analyser.getByteFrequencyData(data);
            let vol = data.reduce((a, b) => a + b) / data.length;
            const wrap = document.getElementById(`wrap-${id}`);
            if(wrap) {
                if(vol > 35) wrap.classList.add('speaking');
                else wrap.classList.remove('speaking');
            }
            requestAnimationFrame(check);
        }
        check();
    }

    // 5. CHAT & SIDEBAR
    function toggleSidebar() {
        const side = document.getElementById('side-panel');
        side.style.display = (side.style.display === 'flex') ? 'none' : 'flex';
    }

    function switchTab(tab) {
        document.getElementById('tab-members').style.display = tab === 'members' ? 'block' : 'none';
        document.getElementById('tab-chat').style.display = tab === 'chat' ? 'flex' : 'none';
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.innerText.toLowerCase().includes(tab)));
    }

    function sendChatMessage() {
        const input = document.getElementById('chatInput');
        if(!input.value) return;
        const msgDiv = document.getElementById('chat-messages');
        msgDiv.innerHTML += `<div class="msg"><b>Bạn:</b> ${input.value}</div>`;
        input.value = "";
        msgDiv.scrollTop = msgDiv.scrollHeight;
    }

    function updateMemberList(id, label) {
        const list = document.getElementById('member-list');
        const li = document.createElement('li');
        li.style.marginBottom = "10px";
        li.innerHTML = `○ ${label} <small style="color:var(--cyan)">[Online]</small>`;
        list.appendChild(li);
    }

    // 6. ĐIỀU KHIỂN THIẾT BỊ
    function toggleMic() {
        const track = localStream.getAudioTracks()[0];
        track.enabled = !track.enabled;
        document.getElementById('micBtn').classList.toggle('off', !track.enabled);
        document.getElementById('mic-status-me').innerText = track.enabled ? "🎤" : "🔇";
    }

    function toggleCam() {
        const track = localStream.getVideoTracks()[0];
        track.enabled = !track.enabled;
        document.getElementById('camBtn').classList.toggle('off', !track.enabled);
    }

    async function toggleShare() {
        try {
            const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            addVideo('share-me', screenStream, "Màn hình của " + myName);
            screenStream.getVideoTracks()[0].onended = () => document.getElementById('wrap-share-me').remove();
        } catch (e) { showToast("Đã hủy chia sẻ"); }
    }

    function remoteMute(targetId) {
        showToast("Đã gửi yêu cầu tắt Mic tới " + targetId);
        // Logic gửi tín hiệu tắt mic cho người khác qua PeerJS Data Connection
    }
</script>
</body>
</html>
