<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DTU MEET Pro - Custom Timer & Control</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #0a192f; --gold: #ffd700; --navy: #112240; --cyan: #64ffda; --red: #ff4d4d; --gray: #233554; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; user-select: none; }
        body { background: var(--bg); color: #e6f1ff; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        #video-grid { flex: 1; display: flex; flex-wrap: wrap; gap: 15px; padding: 80px 15px 15px 15px; align-content: center; justify-content: center; overflow-y: auto; }
        .video-wrapper { position: relative; background: #000; border-radius: 15px; overflow: hidden; aspect-ratio: 16/9; border: 3px solid var(--gray); width: 100%; max-width: 450px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        .speaking { border-color: var(--gold) !important; box-shadow: 0 0 15px var(--gold); }
        .avatar { width: 80px; height: 80px; background: var(--gray); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; color: var(--cyan); border: 2px solid var(--cyan); text-transform: uppercase; }

        .info-bar { position: absolute; top: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; z-index: 1000; pointer-events: none; }
        .info-item { background: rgba(17, 34, 64, 0.95); padding: 8px 15px; border-radius: 10px; border: 1px solid var(--cyan); color: var(--gold); pointer-events: auto; font-weight: bold; }

        .toolbar { height: 85px; background: var(--navy); display: flex; justify-content: center; align-items: center; gap: 12px; border-top: 1px solid var(--gray); padding-bottom: env(safe-area-inset-bottom); }
        .btn-tool { width: 48px; height: 48px; border-radius: 50%; border: none; cursor: pointer; background: var(--gray); color: white; font-size: 20px; display: flex; align-items: center; justify-content: center; }
        .btn-tool.off { background: var(--red); }

        #chat-section { width: 320px; display: flex; flex-direction: column; background: var(--navy); border-left: 1px solid var(--gray); transition: 0.3s; }
        #chat-section.hidden { width: 0; overflow: hidden; border: none; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 8px 12px; border-radius: 15px; font-size: 13px; max-width: 85%; word-wrap: break-word; }
        .msg-me { align-self: flex-end; background: var(--cyan); color: var(--bg); }

        @media (max-width: 768px) { #chat-section { position: fixed; inset: 0; width: 100%; z-index: 2000; } }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="home-screen" style="position:fixed; inset:0; background:var(--bg); z-index:5000; display:flex; align-items:center; justify-content:center; padding:20px;">
    <div style="background:var(--navy); padding:25px; border-radius:20px; width:100%; max-width:380px; border:1px solid var(--cyan); text-align:center;">
        <h2 style="color:var(--gold); margin-bottom: 20px;">DTU MEET PRO</h2>
        <input type="text" id="userName" placeholder="Tên của bạn..." style="width:100%; padding:12px; margin-bottom:12px; border-radius:8px; border:none; background:#0d1b2a; color:white; border:1px solid var(--gray);">
        
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <select id="callMode" style="flex:1; padding:10px; border-radius:8px; background:#0d1b2a; color:white; border:1px solid var(--gray);">
                <option value="video">🎥 Chế độ Video</option>
                <option value="voice">📞 Chế độ Thoại</option>
            </select>
        </div>

        <div style="margin-bottom: 15px; text-align: left;">
            <label style="font-size: 12px; color: var(--cyan); margin-left: 5px;">Hẹn giờ cuộc gọi:</label>
            <div style="display: flex; gap: 5px; margin-top: 5px;">
                <input type="number" id="timeValue" placeholder="Nhập số..." style="flex:2; padding:10px; border-radius:8px; border:none; background:#0d1b2a; color:white; border:1px solid var(--gray);">
                <select id="timeUnit" style="flex:1.5; padding:10px; border-radius:8px; background:#0d1b2a; color:white; border:1px solid var(--gray);">
                    <option value="none">Vô hạn</option>
                    <option value="m">Phút</option>
                    <option value="h">Tiếng</option>
                </select>
            </div>
        </div>

        <button onclick="startApp(true)" style="width:100%; padding:12px; background:var(--cyan); border:none; border-radius:8px; font-weight:bold; cursor:pointer;">TẠO PHÒNG (ADMIN)</button>
        <div style="margin:10px 0; opacity:0.5;">-- HOẶC --</div>
        <input type="text" id="roomInput" inputmode="numeric" placeholder="Mã 6 số..." style="width:100%; padding:12px; margin-bottom:12px; border-radius:8px; border:none; background:#0d1b2a; color:white;">
        <button onclick="startApp(false)" style="width:100%; padding:12px; background:transparent; border:1px solid var(--cyan); color:var(--cyan); border-radius:8px; cursor:pointer;">VÀO PHÒNG</button>
    </div>
</div>

<div id="app-container" style="display:none; height:100vh; flex-direction:row;">
    <div id="video-section" style="flex:1; display:flex; flex-direction:column; position:relative;">
        <div class="info-bar">
            <div class="info-item" onclick="copyCode()">🔑: <span id="room-display">---</span></div>
            <div id="timer-display" class="info-item" style="color:var(--red); display:none;">⏱ 00:00</div>
            <div class="info-item">👥 <span id="user-total">1</span></div>
        </div>
        <div id="video-grid"></div>
        <div class="toolbar">
            <button class="btn-tool" id="micBtn" onclick="toggleMic()">🎤</button>
            <button class="btn-tool" id="camBtn" onclick="toggleCam()">📷</button>
            <button class="btn-tool" onclick="toggleChat()">💬 <div id="chat-badge" style="position:absolute; top:-5px; right:-5px; background:red; color:white; font-size:10px; width:18px; height:18px; border-radius:50%; display:none; align-items:center; justify-content:center;">0</div></button>
            <button onclick="location.reload()" style="background:var(--red); color:white; border:none; padding:10px 15px; border-radius:20px; font-weight:bold; cursor:pointer;">RỜI PHÒNG</button>
        </div>
    </div>
    <div id="chat-section" class="hidden">
        <div style="padding:15px; font-weight:bold; border-bottom:1px solid var(--gray); display:flex; justify-content:space-between; color:var(--cyan);"><b>CHAT BOX</b> <span onclick="toggleChat()" style="cursor:pointer; color:var(--red);">✖</span></div>
        <div id="chat-messages"></div>
        <div style="padding:15px; display:flex; gap:8px; border-top:1px solid var(--gray);">
            <input type="text" id="chatInput" placeholder="Nhắn tin..." style="flex:1; padding:10px; border-radius:20px; border:none; background:var(--gray); color:white; outline:none;">
            <button onclick="sendChat()" style="background:var(--cyan); border:none; border-radius:50%; width:40px; height:40px;">➤</button>
        </div>
    </div>
</div>

<script>
    let localStream, peer, myName, roomCode, isAdmin = false, unreadCount = 0, isVoiceOnlyMode = false;
    const conns = {}, calls = {};

    document.addEventListener('keydown', e => { if (e.target.id === 'chatInput' && e.key === 'Enter') { e.preventDefault(); sendChat(); } });

    async function startApp(isCreate) {
        myName = document.getElementById('userName').value || "User";
        isAdmin = isCreate;
        isVoiceOnlyMode = document.getElementById('callMode').value === 'voice';
        roomCode = isCreate ? Math.floor(100000 + Math.random() * 900000).toString() : document.getElementById('roomInput').value;
        
        const timeVal = parseInt(document.getElementById('timeValue').value);
        const timeUnit = document.getElementById('timeUnit').value;

        if(!roomCode) return;

        try {
            localStream = await navigator.mediaDevices.getUserMedia({ 
                video: isVoiceOnlyMode ? false : true, 
                audio: true 
            });

            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            document.getElementById('room-display').innerText = roomCode;
            
            addVideo('me', localStream, myName + " (Bạn)");
            
            // Xử lý đếm ngược nếu là Admin và có nhập thời gian
            if(isAdmin && timeUnit !== 'none' && !isNaN(timeVal)) {
                let totalSeconds = timeUnit === 'm' ? timeVal * 60 : timeVal * 3600;
                const display = document.getElementById('timer-display');
                display.style.display = 'block';
                const timer = setInterval(() => {
                    totalSeconds--;
                    let h = Math.floor(totalSeconds / 3600);
                    let m = Math.floor((totalSeconds % 3600) / 60);
                    let s = totalSeconds % 60;
                    display.innerText = `⏱ ${h > 0 ? h + ':' : ''}${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
                    if(totalSeconds <= 0) { clearInterval(timer); location.reload(); }
                }, 1000);
            }
            
            initPeer();
        } catch (e) { alert("Lỗi thiết bị!"); }
    }

    function initPeer() {
        const myId = isAdmin ? `DTU-${roomCode}-ADMIN` : `DTU-${roomCode}-${Math.random().toString(36).substr(2, 5)}`;
        peer = new Peer(myId, { config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] } });

        peer.on('open', id => {
            if (!isAdmin) {
                const adminId = `DTU-${roomCode}-ADMIN`;
                const conn = peer.connect(adminId);
                setupData(conn);
                peer.call(adminId, localStream);
            }
        });
        peer.on('call', call => { call.answer(localStream); setupCall(call); });
        peer.on('connection', conn => { 
            setupData(conn); 
            if (isAdmin) {
                peer.call(conn.peer, localStream);
                broadcast({ type: 'sync-mesh', peerId: conn.peer }, conn.peer);
            }
        });
    }

    function setupCall(call) {
        calls[call.peer] = call;
        call.on('stream', stream => addVideo(call.peer, stream, "Thành viên"));
        call.on('close', () => removeVideo(call.peer));
    }

    function setupData(conn) {
        conns[conn.peer] = conn;
        conn.on('data', data => {
            if (data.type === 'chat') handleChat(data);
            if (data.type === 'remote-control') {
                if(data.action === 'mic') toggleMic();
                if(data.action === 'cam') toggleCam();
            }
            if (data.type === 'sync-mesh' && !isAdmin) {
                peer.call(data.peerId, localStream);
                const newConn = peer.connect(data.peerId);
                setupData(newConn);
            }
        });
    }

    function addVideo(id, stream, label) {
        if (document.getElementById(`wrap-${id}`)) return;
        const grid = document.getElementById('video-grid');
        const wrap = document.createElement('div');
        wrap.className = 'video-wrapper';
        wrap.id = `wrap-${id}`;
        
        // CHỈ HIỂN THỊ AVATAR (Màn hình đen)
        // Dù bật cam, video tag vẫn bị display:none, chỉ để stream chạy ngầm
        wrap.innerHTML = `<div class="avatar">${label.charAt(0)}</div>
                           <video id="vid-${id}" autoplay playsinline muted style="display:none;"></video>
                           <div style="position:absolute; bottom:8px; left:12px; background:rgba(0,0,0,0.6); padding:4px 10px; border-radius:8px; font-size:11px;">${label}</div>`;
        
        // ADMIN CLICK ĐỂ ĐIỀU KHIỂN THÀNH VIÊN
        if(isAdmin && id !== 'me') {
            wrap.onclick = () => {
                const act = confirm(`Điều khiển ${label}?\nOK: Bật/Tắt Mic\nCancel: Bật/Tắt Cam`);
                const c = conns[id];
                if(c) c.send({ type: 'remote-control', action: act ? 'mic' : 'cam' });
            };
        }

        grid.appendChild(wrap);
        if (document.getElementById(`vid-${id}`)) document.getElementById(`vid-${id}`).srcObject = stream;
        detectVoice(stream, id);
        updateCount();
    }

    function toggleMic() {
        const t = localStream.getAudioTracks()[0];
        if(t) { t.enabled = !t.enabled; document.getElementById('micBtn').classList.toggle('off', !t.enabled); }
    }

    function toggleCam() {
        if(isVoiceOnlyMode) return;
        const t = localStream.getVideoTracks()[0];
        if(t) { t.enabled = !t.enabled; document.getElementById('camBtn').classList.toggle('off', !t.enabled); }
    }

    function handleChat(data) {
        displayChat(data.user, data.msg, false);
        if (document.getElementById('chat-section').classList.contains('hidden')) {
            unreadCount++;
            const badge = document.getElementById('chat-badge');
            badge.innerText = unreadCount; badge.style.display = 'flex';
        }
        if (isAdmin) broadcast(data, data.from);
    }

    function sendChat() {
        const input = document.getElementById('chatInput');
        if (!input.value.trim()) return;
        const data = { type: 'chat', user: myName, msg: input.value, from: peer.id };
        displayChat(myName, input.value, true);
        broadcast(data);
        input.value = "";
    }

    function broadcast(data, ex) { for(let id in conns) if(id !== ex) conns[id].send(data); }
    function displayChat(u, m, me) { 
        const b = document.getElementById('chat-messages');
        const d = document.createElement('div');
        d.className = `msg ${me?'msg-me':'msg-them'}`;
        d.innerHTML = `<b>${me?'Bạn':u}:</b> ${m}`;
        b.appendChild(d); b.scrollTop = b.scrollHeight;
    }
    function toggleChat() { 
        document.getElementById('chat-section').classList.toggle('hidden'); 
        if(!document.getElementById('chat-section').classList.contains('hidden')) {
            unreadCount = 0; document.getElementById('chat-badge').style.display = 'none';
        }
    }
    function detectVoice(s, id) {
        const ctx = new AudioContext();
        const ana = ctx.createAnalyser(); ctx.createMediaStreamSource(s).connect(ana);
        const d = new Uint8Array(ana.frequencyBinCount);
        const check = () => {
            ana.getByteFrequencyData(d);
            let v = d.reduce((a,b)=>a+b)/d.length;
            const w = document.getElementById(`wrap-${id}`);
            if(w) { w.classList.toggle('speaking', v > 35); requestAnimationFrame(check); }
        }; check();
    }
    function removeVideo(id) { const el = document.getElementById(`wrap-${id}`); if(el) el.remove(); delete conns[id]; delete calls[id]; updateCount(); }
    function updateCount() { document.getElementById('user-total').innerText = document.querySelectorAll('.video-wrapper').length; }
    function copyCode() { navigator.clipboard.writeText(roomCode); alert("Đã copy!"); }
</script>
</body>
</html>
