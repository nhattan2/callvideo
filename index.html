<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTU MEET Pro - Global Connect Fix</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #0a192f; --gold: #ffd700; --navy: #112240; --cyan: #64ffda; --red: #ff4d4d; --gray: #233554; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; user-select: none; }
        body { background: var(--bg); color: #e6f1ff; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* GIAO DIỆN CHỜ */
        #home-screen { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .home-box { background: var(--navy); padding: 30px; border-radius: 20px; width: 380px; border: 1px solid var(--cyan); text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--gray); background: #0d1b2a; color: white; outline: none; }

        /* MÀN HÌNH CHÍNH */
        #app-container { display: none; height: 100vh; flex-direction: row; }
        #video-section { flex: 1; display: flex; flex-direction: column; position: relative; }
        
        .info-bar { position: absolute; top: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; z-index: 1000; pointer-events: none; }
        .info-item { background: rgba(17, 34, 64, 0.9); padding: 8px 15px; border-radius: 10px; border: 1px solid var(--cyan); color: var(--gold); pointer-events: auto; cursor: pointer; font-size: 13px; font-weight: bold; }

        #video-grid { flex: 1; display: flex; flex-wrap: wrap; gap: 15px; padding: 70px 20px 20px 20px; align-content: center; justify-content: center; overflow-y: auto; }
        .video-wrapper { position: relative; background: #000; border-radius: 15px; overflow: hidden; aspect-ratio: 16/9; border: 3px solid var(--gray); width: 100%; max-width: 450px; transition: 0.3s; }
        
        /* HIỆU ỨNG NGƯỜI NÓI */
        .speaking { border-color: var(--gold) !important; box-shadow: 0 0 15px var(--gold); transform: scale(1.02); }

        /* SIDEBAR CHAT */
        #chat-section { width: 300px; display: flex; flex-direction: column; background: var(--navy); border-left: 1px solid var(--gray); transition: 0.3s; }
        #chat-section.hidden { width: 0; overflow: hidden; border: none; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 8px 12px; border-radius: 15px; font-size: 13px; max-width: 85%; }
        .msg-me { align-self: flex-end; background: var(--cyan); color: var(--bg); }
        .msg-them { align-self: flex-start; background: var(--gray); color: white; }

        /* TOOLBAR */
        .toolbar { height: 80px; background: var(--navy); display: flex; justify-content: center; align-items: center; gap: 10px; border-top: 1px solid var(--gray); }
        .btn-tool { width: 45px; height: 45px; border-radius: 50%; border: none; cursor: pointer; background: var(--gray); color: white; font-size: 18px; }
        .btn-tool.active { background: var(--red); }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="home-screen">
    <div class="home-box">
        <h2 style="color: var(--gold); margin:0;">DTU MEET PRO</h2>
        <p style="font-size:12px; opacity:0.6;">Đồ án Tốt nghiệp - Tân DTU</p>
        <input type="text" id="userName" placeholder="Tên của bạn..." autocomplete="off">
        <button onclick="startApp(true)" style="width:100%; padding:12px; background:var(--cyan); border:none; border-radius:8px; font-weight:bold; cursor:pointer;">TẠO PHÒNG MỚI</button>
        <div style="margin:10px 0; font-size:12px; opacity:0.5;">-- HOẶC --</div>
        <input type="text" id="roomInput" placeholder="Nhập mã 6 số...">
        <button onclick="startApp(false)" style="width:100%; padding:12px; background:transparent; border:1px solid var(--cyan); color:var(--cyan); border-radius:8px; cursor:pointer;">VÀO PHÒNG</button>
    </div>
</div>

<div id="app-container">
    <div id="video-section">
        <div class="info-bar">
            <div class="info-item" onclick="copyCode()">🔑 PHÒNG: <span id="room-display">------</span> (Bấm để copy)</div>
            <div class="info-item">👥 <span id="user-total">1</span> người</div>
        </div>
        <div id="video-grid"></div>
        <div class="toolbar">
            <button class="btn-tool" id="micBtn" onclick="toggleMic()">🎤</button>
            <button class="btn-tool" id="camBtn" onclick="toggleCam()">📷</button>
            <button class="btn-tool" onclick="toggleChat()">💬</button>
            <button class="btn-tool" id="shareBtn" onclick="toggleShare()">🖥️</button>
            <button onclick="location.reload()" style="background:var(--red); color:white; border:none; padding:10px 20px; border-radius:20px; cursor:pointer; font-weight:bold;">KẾT THÚC</button>
        </div>
    </div>

    <div id="chat-section" class="hidden">
        <div style="padding:15px; font-weight:bold; border-bottom:1px solid var(--gray); color:var(--cyan);">CHAT BOX</div>
        <div id="chat-messages"></div>
        <div style="padding:10px; display:flex; gap:5px;">
            <input type="text" id="chatInput" placeholder="Nhập tin nhắn..." style="flex:1; padding:8px; border-radius:15px; border:none; outline:none; background:var(--gray); color:white;">
            <button onclick="sendChat()" style="background:var(--cyan); border:none; border-radius:50%; width:35px; height:35px;">➤</button>
        </div>
    </div>
</div>

<script>
    let localStream, peer, myName, roomCode, isAdmin = false;
    const peerConnections = {};

    // Cấm F12
    document.onkeydown = e => { if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false; };

    async function startApp(isCreate) {
        myName = document.getElementById('userName').value || "User";
        isAdmin = isCreate;
        roomCode = isCreate ? Math.floor(100000 + Math.random() * 900000).toString() : document.getElementById('roomInput').value;

        if(!roomCode || roomCode.length < 6) return alert("Mã phòng không hợp lệ!");

        try {
            localStream = await navigator.mediaDevices.getUserMedia({ 
                video: true, 
                audio: { echoCancellation: true, noiseSuppression: true } 
            });
            
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            document.getElementById('room-display').innerText = roomCode;

            addVideo('me', localStream, myName + " (Bạn)");
            initPeer();
        } catch (e) { alert("Vui lòng cấp quyền Camera/Mic và sử dụng HTTPS!"); }
    }

    function initPeer() {
        // CẤU HÌNH QUAN TRỌNG: Thêm STUN Server của Google để kết nối xuyên mạng
        const config = {
            config: {
                'iceServers': [
                    { 'urls': 'stun:stun.l.google.com:19302' },
                    { 'urls': 'stun:stun1.l.google.com:19302' },
                    { 'urls': 'stun:stun2.l.google.com:19302' }
                ]
            }
        };

        // ID cố định cho Admin để người khác dễ tìm
        const myPeerId = isAdmin ? 'DTU-ROOM-' + roomCode : 'DTU-USER-' + Math.random().toString(36).substr(2, 5);
        peer = new Peer(myPeerId, config);

        peer.on('open', id => {
            console.log("Peer ID của tôi:", id);
            if (!isAdmin) {
                // Nếu là người vào, tự động gọi cho Admin của phòng đó
                const call = peer.call('DTU-ROOM-' + roomCode, localStream);
                call.on('stream', remoteStream => addVideo('admin', remoteStream, "Chủ phòng"));
            }
        });

        // Lắng nghe cuộc gọi đến (Admin nhận cuộc gọi từ thành viên)
        peer.on('call', call => {
            call.answer(localStream);
            call.on('stream', remoteStream => addVideo(call.peer, remoteStream, "Thành viên mới"));
        });
    }

    function addVideo(id, stream, label) {
        if(document.getElementById(`wrap-${id}`)) return;
        const grid = document.getElementById('video-grid');
        const wrap = document.createElement('div');
        wrap.className = 'video-wrapper';
        wrap.id = `wrap-${id}`;
        wrap.innerHTML = `
            <video id="vid-${id}" autoplay playsinline style="width:100%; height:100%; object-fit:cover;"></video>
            <div style="position:absolute; bottom:8px; left:10px; background:rgba(0,0,0,0.6); padding:3px 10px; border-radius:8px; font-size:11px;">${label}</div>
        `;
        grid.appendChild(wrap);
        document.getElementById(`vid-${id}`).srcObject = stream;
        detectVoice(stream, id);
        updateUserCount();
    }

    function detectVoice(stream, id) {
        const audioCtx = new AudioContext();
        const analyser = audioCtx.createAnalyser();
        audioCtx.createMediaStreamSource(stream).connect(analyser);
        const data = new Uint8Array(analyser.frequencyBinCount);
        const check = () => {
            analyser.getByteFrequencyData(data);
            let volume = data.reduce((a, b) => a + b) / data.length;
            const el = document.getElementById(`wrap-${id}`);
            if(el) {
                if(volume > 35) el.classList.add('speaking'); // HIỆN VIỀN VÀNG KHI NÓI
                else el.classList.remove('speaking');
                requestAnimationFrame(check);
            }
        };
        check();
    }

    function copyCode() {
        navigator.clipboard.writeText(roomCode);
        alert("Đã copy mã phòng: " + roomCode);
    }

    function toggleChat() { document.getElementById('chat-section').classList.toggle('hidden'); }
    function updateUserCount() { document.getElementById('user-total').innerText = document.querySelectorAll('.video-wrapper').length; }
    
    function toggleMic() {
        localStream.getAudioTracks()[0].enabled = !localStream.getAudioTracks()[0].enabled;
        document.getElementById('micBtn').classList.toggle('active');
    }
    function toggleCam() {
        localStream.getVideoTracks()[0].enabled = !localStream.getVideoTracks()[0].enabled;
        document.getElementById('camBtn').classList.toggle('active');
    }
    async function toggleShare() {
        const screen = await navigator.mediaDevices.getDisplayMedia({ video: true });
        addVideo('share', screen, "Đang chia sẻ màn hình");
    }
    function sendChat() {
        const input = document.getElementById('chatInput');
        if(!input.value) return;
        document.getElementById('chat-messages').innerHTML += `<div class="msg msg-me">${input.value}</div>`;
        input.value = "";
        document.getElementById('chat-messages').scrollTop = 9999;
    }
</script>
</body>
</html>
